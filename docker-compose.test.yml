# Lightweight test environment for the agent harness.
# Starts only what's needed to run tests and the service in the sandbox.
# Usage: docker-compose -f docker-compose.test.yml up -d

services:

  db:
    image: postgres:16.2-alpine
    container_name: airport-test-db
    environment:
      POSTGRES_DB: airport_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: testpass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d airport_test"]
      interval: 2s
      timeout: 5s
      retries: 20

  migration:
    image: flyway/flyway:10
    container_name: airport-test-migration
    network_mode: host
    environment:
      - FLYWAY_BASELINE_ON_MIGRATE=true
    entrypoint:
      - flyway
      - -url=jdbc:postgresql://localhost:5432/airport_test
      - -user=test
      - -password=testpass
      - migrate
    volumes:
      - ./database/db_migration:/flyway/sql
    depends_on:
      db:
        condition: service_healthy
